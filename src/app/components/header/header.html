<header class="topbar">
    <button class="menu-btn" (click)="emp.toggleSidebar()" aria-label="Toggle menu">
        ☰
    </button>
    <span class="welcome">Welcome, {{userName()}}</span>
    <span class="top-date">{{ currentDate }}</span>

    <!-- Profile Avatar with Dropdown -->
    <div class="profile-wrap" (click)="profileOpen = !profileOpen">
        <div class="profile-avatar">
            <span>{{getInitials()}}</span>
        </div>
        @if (profileOpen) {
        <div class="profile-dropdown" (click)="$event.stopPropagation()">
            <div class="profile-dropdown-header">
                <div class="profile-avatar-lg"><span>{{getInitials()}}</span></div>
                <div>
                    <div class="profile-name">{{userName()}}</div>
                    <div class="profile-email">{{userEmail()}}</div>
                </div>
            </div>
            <div class="profile-dropdown-divider"></div>
            <a class="profile-dropdown-item" routerLink="/dashboard/myprofile" (click)="profileOpen = false">
                <i class="fas fa-user"></i>
                My Profile
            </a>
            <button class="profile-dropdown-item danger" (click)="logout()">
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </button>
        </div>
        }
    </div>
</header>

<div class="page-loader" *ngIf="isLoggingOut">
    <div class="loader-content">
        <div class="fas fa-spinner fa-spin"></div>
        <p>Logging out...</p>
    </div>
</div>
