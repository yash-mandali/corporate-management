<aside class="sidebar" [class.mobile-open]="emp.sidebarOpen()">
    <div class="sidebar-logo">
        <span class="logo-text" routerLink="/dashboard">{{role()}} Portal</span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <a *ngFor="let item of menuItems(); trackBy: trackByRoute" class="nav-item" [routerLink]="item.route"
            routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="emp.closeSidebar()">
            <i [class]="item.icon"></i>
            <span class="nav-label">{{ item.label }}</span>
        </a>
    </nav>
    <div class="sidebar-logout">
        <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
</aside>
<!-- Logout Loader -->
<div class="page-loader" *ngIf="isLoggingOut">
    <div class="loader-content">
        <div class="fas fa-spinner fa-spin"></div>
        <p>Logging out...</p>
    </div>
</div>
