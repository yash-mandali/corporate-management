<div class="notfound-wrapper">

    <!-- Floating background orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <!-- Grid overlay -->
    <div class="bg-grid"></div>

    <div class="nf-card">

        <!-- Animated 404 -->
        <div class="nf-code">
            <span class="n4">4</span>
            <div class="nf-zero-wrap">
                <div class="nf-zero">
                    <div class="nf-zero-inner">
                        <i class="fas fa-search"></i>
                    </div>
                </div>
            </div>
            <span class="n4">4</span>
        </div>

        <div class="nf-divider">
            <div class="nf-divider-line"></div>
            <span class="nf-divider-dot"></span>
            <div class="nf-divider-line"></div>
        </div>

        <div class="nf-text">
            <div class="nf-title">Page Not Found</div>
            <div class="nf-sub">
                The page you're looking for doesn't exist or has been moved.
                <br>Let's get you back on track.
            </div>
        </div>

        <!-- Back button -->
        <button class="nf-back-btn" (click)="goBack()">
            <i class="fas fa-chevron-left"></i> Go Back
        </button>

    </div>

</div>
